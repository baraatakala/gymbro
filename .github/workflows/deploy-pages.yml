# https://baraatakala.github.io/gymbro/
# Publishes built files to repo root (works with Pages: main / root) and docs/.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'
      - 'assets/**'
      - 'quotes/**'
      - 'docs/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Publish built files (root + docs)
        run: |
          rm -rf docs assets quotes
          mkdir -p docs
          cp -r dist/* docs/
          touch docs/.nojekyll
          cp dist/index.html index.html
          cp dist/index.html docs/index.html
          cp -r dist/assets assets
          cp -r dist/quotes quotes
          touch .nojekyll

      - name: Commit site output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets quotes docs .nojekyll
          if git diff --staged --quiet; then
            echo "Site files unchanged"
          else
            git commit -m "chore(pages): update built site [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
